name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure Claude Code
        env:
          BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
        run: |
          mkdir -p ~/.claude
          echo '{
            "env": {
              "ANTHROPIC_BASE_URL": "https://dashscope.aliyuncs.com/apps/anthropic",
              "ANTHROPIC_AUTH_TOKEN": "'"$BAILIAN_API_KEY"'",
              "ANTHROPIC_MODEL": "kimi-k2.5"
            }
          }' > ~/.claude/settings.json

      - name: Run Code Review
        id: review
        run: |
          # 读取 Code Review 提示词
          REVIEW_PROMPT=$(cat .github/CODE_REVIEW_PROMPT.md)

          # 获取 Diff
          # ${{ github.base_ref }} 是 PR 的目标分支
          # ${{ github.head_ref }} 是 PR 的源分支
          git diff origin/${{ github.base_ref }}...origin/${{ github.head_ref }} | claude -p "$REVIEW_PROMPT" --output-format json > result.json

          # 检查执行结果
          if [ $? -ne 0 ]; then
            echo "Code Review 失败"
            exit 1
          fi

          # 解析结果, 将其设置为 Action 的输出
          REPORT=$(jq -r '.result' result.json)
          
          # 将多行字符串转换为GITHUB actions 的输出格式
          echo "report_content<<EOF" >> $GITHUB_OUTPUT
          echo "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post Review Comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORT_CONTENT: ${{ steps.review.outputs.report_content }}
        uses: actions/github-script@v7
        with:
          script: |
            const report = process.env.REPORT_CONTENT;

            // 只有当 report 不为空时，才发布评论
            if (report && !report.includes("没有发现明显问题")) {
              github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `### AI Code Review Report\n\n${report}`
              });
            } else {
              console.log("没有发现明显问题，不发布评论");
            }
